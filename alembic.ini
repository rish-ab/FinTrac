[alembic]
script_location = migrations
prepend_sys_path = .

# Sync URL only — Alembic runs migrations synchronously
# The actual value is overridden in migrations/env.py using config.py
sqlalchemy.url = mysql+pymysql://fintrac_user:changeme@mariadb:3306/fintrac

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S